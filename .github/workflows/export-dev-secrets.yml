# Packages dev secrets (stored as GitHub repo secrets) into a short-lived
# artifact so sync-dev-env.mjs pull-gh can restore them on another machine.
# Triggered only via workflow_dispatch — never on push.
name: Export dev secrets bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Build dev secrets bundle
        env:
          DEV_ENV_LOCAL: ${{ secrets.DEV_ENV_LOCAL }}
          DEV_SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          DEV_AWS_SETUP_CONFIG: ${{ secrets.DEV_AWS_SETUP_CONFIG }}
          DEV_AWS_SETUP_OUTPUTS: ${{ secrets.DEV_AWS_SETUP_OUTPUTS }}
          DEV_AWS_CREDENTIALS: ${{ secrets.DEV_AWS_CREDENTIALS }}
          DEV_AWS_CONFIG: ${{ secrets.DEV_AWS_CONFIG }}
        run: |
          set -euo pipefail
          root="ultraviris-dev-bundle"
          mkdir -p "$root/ssh" "$root/scripts" "$root/aws"

          write_if_set() {
            local dest="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" > "$dest"
            fi
          }

          write_if_set "$root/.env.local" "$DEV_ENV_LOCAL"
          write_if_set "$root/ssh/private-key" "$DEV_SSH_PRIVATE_KEY"
          write_if_set "$root/scripts/aws-setup.config" "$DEV_AWS_SETUP_CONFIG"
          write_if_set "$root/scripts/aws-setup-outputs.env" "$DEV_AWS_SETUP_OUTPUTS"
          write_if_set "$root/aws/credentials" "$DEV_AWS_CREDENTIALS"
          write_if_set "$root/aws/config" "$DEV_AWS_CONFIG"

          if [ -f "$root/ssh/private-key" ]; then
            chmod 600 "$root/ssh/private-key"
          fi

          exported_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '%s\n' \
            '{' \
            '  "version": 1,' \
            "  \"exportedAt\": \"$exported_at\"," \
            '  "platform": "github-actions",' \
            '  "repo": "ultraviris-2026",' \
            '  "source": "github-secrets"' \
            '}' > "$root/manifest.json"

          if [ ! -f "$root/.env.local" ]; then
            echo "DEV_ENV_LOCAL secret is not set. Run: node scripts/sync-dev-env.mjs push-gh" >&2
            exit 1
          fi

          tar czf dev-secrets-bundle.tar.gz "$root"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-secrets-bundle
          path: dev-secrets-bundle.tar.gz
          retention-days: 1
