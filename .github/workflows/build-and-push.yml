name: CI/CD (test → ECR → EC2)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Required for GitHub OIDC -> AWS IAM role assumption (no long-lived keys).
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPO: ultraviris
  # EC2 tag the deploy step targets (instances launched by scripts/launch-ec2.sh).
  APP_TAG: ultraviris
  # ASG + SSM image-tag pointer used by the zero-downtime instance-refresh deploy.
  ASG_NAME: ultraviris-asg
  IMAGE_TAG_PARAM: /ultraviris/image-tag
  # Secrets Manager secret holding the app's runtime env (dotenv-formatted).
  ENV_SECRET: ultraviris/env

jobs:
  # ── Gate everything on the same checks that run on PRs ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test

  # ── Build the ARM64 image and push it to ECR (tag = git short sha + latest) ──
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.vars.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail the build on actionable (fixable) CRITICAL/HIGH CVEs in OS packages
      # or app dependencies. `ignore-unfixed` avoids blocking on base-image CVEs
      # with no available patch. Already logged in to ECR above, so Trivy can
      # pull the just-pushed image.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.vars.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  # ── Sync secrets, then roll out the freshly-pushed tag — mirrors `make ship` ─
  deploy:
    needs: build
    # Only auto-deploy from the default branch; tag builds just publish to ECR.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Rebuild the production env from the repo's APP_* Secrets + Variables. This
      # is the CI equivalent of the local .env.local that `make ship` reads.
      - name: Assemble production env from repo Secrets + Variables
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          VARS_JSON: ${{ toJSON(vars) }}
        run: ./scripts/ci-assemble-env.sh > ci.env

      # Validate the merged result and write it to Secrets Manager (the previous
      # version is retained so the rollout step can roll it back on failure).
      - name: Validate + sync secrets to Secrets Manager
        env:
          ENV_FILE: ci.env
        run: npm run --silent sync-secrets -- --apply

      # Zero-downtime rollout (ASG instance refresh, or in-place SSM fallback).
      # Instances re-read the secret at boot, so the refresh applies both the new
      # image and the new env together. rollout.sh reverts the image-tag pointer
      # on failure; we additionally roll the secret back here.
      - name: Roll out (with secret rollback on failure)
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          if ./scripts/rollout.sh "$TAG"; then
            echo "Deploy succeeded: $TAG"
          else
            echo "::error::Rollout failed — rolling the secret back to its previous version"
            npm run --silent sync-secrets -- --rollback || true
            exit 1
          fi

      - name: Clean up assembled env
        if: always()
        run: rm -f ci.env
